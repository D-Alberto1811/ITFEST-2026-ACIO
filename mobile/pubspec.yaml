name: fitlingo
description: FITLINGO - Gamified fitness app with login, local database and Google sign-in
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.12.0
  crypto: ^3.0.6
  google_mlkit_pose_detection: ^0.14.1
  google_sign_in: ^6.2.1
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
services:
  mysql:
    image: mysql:8.0
    container_name: fitlingo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: itfest
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: fitlingo-api
    ports:
      - "8999:8000"
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/itfest
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: "209952261016-aejhtho8mojmktlq7ke9nu2c6qapfnt2.apps.googleusercontent.com,209952261016-mn4ckiecftq0vnsj5nv5lrd60jp2vsd7.apps.googleusercontent.com"
    depends_on:
      mysql:
        condition: service_healthy

  adminer:
    image: adminer:latest
    container_name: fitlingo-adminer
    ports:
      - "9000:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql

volumes:
  mysql_data:
